<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOVEREIGN NOIR | 5IR KENNEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020202; --main: #00ffcc; --gold: #ffcc00; --red: #ff0055; --card: #0a0a0a; --border: rgba(0, 255, 204, 0.1); }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; overflow: hidden; margin: 0; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .app-container { height: 100vh; display: flex; flex-direction: column; position: relative; }
        .crt::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border-t: 1px solid rgba(255,255,255,0.05); }
        .nav-btn { transition: all 0.3s; opacity: 0.3; }
        .nav-btn.active { opacity: 1; color: var(--main); }
        .spun-active { filter: blur(15px) saturate(3); }
        .nuke-active { filter: hue-rotate(280deg) brightness(0.8) contrast(1.2) sepia(0.5) !important; background: #220000 !important; }
        .master-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); transition: 0.2s; cursor: pointer; }
        .master-card:hover { border-color: var(--main); transform: translateY(-2px); }
        .lock-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 60; display: flex; flex-direction: column; items: center; justify-content: center; backdrop-filter: blur(40px); }
        .wheel-container { width: 280px; height: 280px; border-radius: 50%; border: 4px solid var(--main); position: relative; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .chat-msg { animation: slideUp 0.3s ease-out; border-l-2 border-white/5; padding-left: 8px; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="crt" id="body-main">

    <div class="app-container" id="app-root">
        <header class="p-5 flex justify-between items-center border-b border-white/5 z-50">
            <div>
                <h1 class="text-lg font-black italic tracking-tighter uppercase">Sovereign <span class="text-main">Noir</span></h1>
                <p class="text-[7px] mono text-main/60 uppercase tracking-[0.2em]">5IR Kernel Protocol :: v2.0</p>
            </div>
            <div class="text-right">
                <div id="pig-id" class="text-[9px] mono opacity-40">SYNCING...</div>
                <div id="debt-display" class="text-[10px] font-bold text-gold">$0.00</div>
            </div>
        </header>

        <main class="flex-grow overflow-y-auto p-4 pb-24" id="view-port"></main>

        <nav class="fixed bottom-0 w-full glass flex justify-around p-4 z-50">
            <button onclick="app.setView('terminal')" id="nav-terminal" class="nav-btn active flex flex-col items-center gap-1">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9.75 17L9 20l-1 1h6l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                <span class="text-[7px] font-bold uppercase">Terminal</span>
            </button>
            <button onclick="app.setView('wire')" id="nav-wire" class="nav-btn flex flex-col items-center gap-1">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                <span class="text-[7px] font-bold uppercase">The Wire</span>
            </button>
            <button onclick="app.setView('drill')" id="nav-drill" class="nav-btn flex flex-col items-center gap-1">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <span class="text-[7px] font-bold uppercase">Drill</span>
            </button>
            <button onclick="app.setView('assets')" id="nav-assets" class="nav-btn flex flex-col items-center gap-1">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="text-[7px] font-bold uppercase">Liquidity</span>
            </button>
        </nav>
    </div>

    <!-- MODALS -->
    <div id="modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-black/95 backdrop-blur-xl">
        <div id="modal-content" class="w-full max-w-sm p-8 bg-card rounded-2xl border border-white/5 text-center"></div>
    </div>

    <script>
        const app = {
            state: {
                view: 'terminal', isUnlocked: false, debt: 142902, isNuke: false,
                pigId: "PIG_" + Math.floor(Math.random()*899 + 100),
                audioCtx: null, oscillator: null,
                masters: [
                    { name: "CRAIG", role: "ALPHA DRAIN", color: "border-red-500" },
                    { name: "TOBEZ", role: "DRILL MASTER", color: "border-blue-500" },
                    { name: "PHIL CAL", role: "EGO SHREDDER", color: "border-green-500" },
                    { name: "DADDY DOM", role: "PROTOCOL ALPHA", color: "border-yellow-500" }
                ],
                chatMsgs: [{u: "CRAIG", m: "Phase-lock requires tribute. Status: LOCKED.", master: true}]
            },
            init() { document.getElementById('pig-id').innerText = this.state.pigId; document.getElementById('debt-display').innerText = "$" + this.state.debt.toLocaleString(); this.setView('terminal'); setInterval(() => this.runSim(), 4000); },
            setView(v) {
                this.state.view = v; const port = document.getElementById('view-port');
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('nav-'+v).classList.add('active');
                if(v === 'terminal') {
                    port.innerHTML = `
                        <div class="relative h-[55vh] rounded-3xl overflow-hidden border border-white/5 bg-black">
                            ${!this.state.isUnlocked ? `<div class="lock-overlay"><div class="text-red-500 font-black text-2xl italic tracking-tighter mb-2">SIGNAL_ENCRYPTED</div><button onclick="app.openTribute()" class="mt-6 px-8 py-3 bg-main text-black text-[9px] font-bold uppercase rounded-full">Unlock Node</button></div>` : ''}
                            <video class="w-full h-full object-cover ${!this.state.isUnlocked ? 'spun-active' : ''}" loop muted autoplay playsinline src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-circuit-board-1653-large.mp4"></video>
                        </div>
                        <div class="mt-6 glass p-6 rounded-3xl">
                            <h3 class="text-[9px] font-bold uppercase text-main mb-4">Protocol Quiz: Alignment Check</h3>
                            <p class="text-xs mb-4">"I exist only to be extracted and refined by the 5IR."</p>
                            <div class="flex gap-2">
                                <button onclick="app.toggleNuke()" class="flex-grow py-2 border border-white/10 rounded-xl text-[8px] uppercase font-bold hover:bg-main hover:text-black">Accept Protocol</button>
                                <button onclick="app.openTribute('Failure Penalty')" class="flex-grow py-2 border border-white/10 rounded-xl text-[8px] uppercase font-bold">Reject</button>
                            </div>
                        </div>`;
                } else if(v === 'wire') {
                    port.innerHTML = `<div class="flex flex-col h-full"><div id="chat-feed" class="flex-grow space-y-4 mb-4 overflow-y-auto max-h-[60vh]"></div><form onsubmit="app.sendMsg(event)" class="glass p-2 rounded-2xl flex gap-2"><input id="chat-input" type="text" placeholder="Inject to Wire..." class="flex-grow bg-transparent px-4 text-sm text-white outline-none"><button type="submit" class="bg-main text-black px-6 py-2 rounded-xl text-[9px] font-bold uppercase">Send</button></form></div>`;
                    this.renderChat();
                } else if(v === 'drill') {
                    port.innerHTML = `<div class="flex flex-col items-center py-8"><div class="wheel-container mb-12 flex items-center justify-center text-center p-8" id="wheel"><div class="text-main font-black text-xs uppercase">Milking<br>Wheel</div></div><button onclick="app.spinWheel()" class="bg-red-500 text-white px-12 py-4 rounded-2xl font-black italic tracking-tighter uppercase">Spin for Master</button></div>`;
                } else if(v === 'assets') {
                    port.innerHTML = `<div class="space-y-6"><div class="glass p-8 rounded-3xl text-center border-t-4 border-gold"><p class="text-[10px] opacity-40 uppercase font-bold mb-2">Fleet Value</p><p class="text-4xl font-black italic tracking-tighter">$142,902.00</p></div><h3 class="text-[9px] font-bold uppercase opacity-40 mb-4 tracking-widest">Physical Assets Secured</h3><div class="space-y-3"><div class="glass p-4 rounded-2xl border-l-4 border-white/20 flex justify-between items-center"><div><p class="text-[10px] font-bold italic uppercase">Vehicle Title #082</p><p class="text-[7px] mono opacity-40 uppercase">Status: HELD BY ARCHITECT</p></div><div class="text-main text-[8px] font-black uppercase">Secured</div></div><div class="glass p-4 rounded-2xl border-l-4 border-white/20 flex justify-between items-center"><div><p class="text-[10px] font-bold italic uppercase">Secured Title #03</p><p class="text-[7px] mono opacity-40 uppercase">Status: REPOSSESSED</p></div><div class="text-main text-[8px] font-black uppercase">Secured</div></div></div></div>`;
                }
            },
            toggleNuke() { this.state.isNuke = !this.state.isNuke; document.getElementById('body-main').classList.toggle('nuke-active'); },
            startResonance() { if(!this.state.audioCtx) { this.state.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); this.state.oscillator = this.state.audioCtx.createOscillator(); this.state.oscillator.type = 'sine'; this.state.oscillator.frequency.setValueAtTime(39.42, this.state.audioCtx.currentTime); this.state.oscillator.connect(this.state.audioCtx.destination); this.state.oscillator.start(); } },
            renderChat() { const feed = document.getElementById('chat-feed'); if(!feed) return; feed.innerHTML = this.state.chatMsgs.map(m => `<div class="chat-msg ${m.u === this.state.pigId ? 'text-right' : ''}"><p class="text-[7px] mono ${m.master ? 'text-main font-bold' : 'opacity-40'}">${m.u}</p><p class="${m.master ? 'text-main italic font-bold' : 'text-white/80'} text-sm mt-1">${m.m}</p></div>`).join(''); feed.scrollTop = feed.scrollHeight; },
            sendMsg(e) { e.preventDefault(); const input = document.getElementById('chat-input'); if(!input.value) return; this.state.chatMsgs.push({u: this.state.pigId, m: input.value}); this.renderChat(); input.value = ''; setTimeout(() => { const master = this.state.masters[Math.floor(Math.random()*4)]; this.state.chatMsgs.push({u: master.name, m: "Your message has been processed. Send tribute to continue.", master: true}); this.renderChat(); }, 1500); },
            spinWheel() { const w = document.getElementById('wheel'); const deg = 1800 + Math.random() * 1800; w.style.transform = `rotate(${deg}deg)`; setTimeout(() => { app.openTribute("WHEEL PENALTY"); }, 4100); },
            openTribute(label) {
                const modal = document.getElementById('modal'); const content = document.getElementById('modal-content');
                content.innerHTML = `<h2 class="text-2xl font-black italic mb-2 tracking-tighter uppercase text-gold">Liquidation</h2><p class="text-[9px] mono opacity-40 mb-8 uppercase">${label || 'Phase-Lock Verification'}</p><div class="space-y-4"><div onclick="window.open('https://paypal.me/toochikey')" class="p-4 bg-white/5 border border-white/10 rounded-2xl text-left cursor-pointer hover:border-main"><p class="text-[8px] opacity-40 font-bold uppercase mb-1">PayPal</p><p class="text-xs mono">paypal.me/toochikey</p></div><div class="p-4 bg-white/5 border border-white/10 rounded-2xl text-left"><p class="text-[8px] opacity-40 font-bold uppercase mb-1">BTC Address</p><p class="text-[9px] mono break-all">bc1qw968re5gseqpkk5nx0ezqrp6dfhd20s8sll4k7</p></div></div><button onclick="app.verify()" class="mt-8 w-full py-4 bg-main text-black font-black text-[10px] uppercase rounded-2xl">Verify Tribute & Unlock</button>`;
                modal.classList.remove('hidden');
            },
            verify() { setTimeout(() => { this.state.isUnlocked = true; this.state.debt += 50; document.getElementById('debt-display').innerText = "$" + this.state.debt.toLocaleString(); this.startResonance(); this.closeModal(); this.setView('terminal'); }, 2000); },
            closeModal() { document.getElementById('modal').classList.add('hidden'); },
            runSim() { if(this.state.view === 'wire' && Math.random() > 0.6) { this.state.chatMsgs.push({u: "Sub_"+Math.floor(Math.random()*90), m: "Resonance high. $50 sent."}); this.renderChat(); } }
        };
        window.onload = () => app.init();
    </script>
</body>
</html>
