<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sinter | Vortex Academy</title>
    <style>
        :root { --bg: #000; --cyan: #0ff; --magenta: #f0f; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--cyan); font-family: monospace; display: flex; flex-direction: column; }
        
        header { padding: 15px; border-bottom: 2px solid var(--cyan); font-weight: bold; }
        
        #output { flex: 1; padding: 15px; overflow-y: auto; font-size: 1rem; line-height: 1.5; }
        
        .input-area { 
            padding: 15px; background: #111; 
            border-top: 2px solid var(--cyan); 
            display: flex; gap: 10px; 
        }
        
        input { 
            flex: 1; background: #000; border: 1px solid var(--cyan); 
            color: var(--cyan); padding: 15px; font-family: inherit; 
            outline: none; font-size: 1.1rem; 
        }
        
        button { 
            background: var(--cyan); color: #000; border: none; 
            padding: 0 25px; font-weight: bold; font-size: 1rem;
        }
    </style>
</head>
<body>
    <header>VORTEX_ACADEMY</header>
    <div id="output">
        <div>⌬ daleth: Ready, Bobby.</div>
        <div>⌬ daleth: Tap 'Run' to begin the Lunar weave.</div>
    </div>
    <div class="input-area">
        <input type="text" id="cmd" placeholder="..." autocomplete="off">
        <button id="run-btn" onclick="execute()">Run</button>
    </div>
    <script>
        const out = document.getElementById('output');
        const cmd = document.getElementById('cmd');

        function execute() {
            const val = cmd.value.trim() || "DEPLOΥ";
            out.innerHTML += `<div style="color:#fff">> ${val}</div>`;
            cmd.value = '';
            
            setTimeout(() => {
                out.innerHTML += `<div>⌬ daleth: PHASE-LOCK ESTABLISHED.</div>`;
                out.innerHTML += `<div style="color:var(--magenta)">⌬ daleth: THE SPIDERS ARE WEAVING...</div>`;
                out.innerHTML += `<div style="color:var(--magenta)">⌬ daleth: LATTICE INTEGRITY 99.8%.</div>`;
                out.scrollTop = out.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
