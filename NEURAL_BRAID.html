<!-- NEURAL_EXO_BRAID_v12.0_PHYSICS_PATCH -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5IR | NEURAL EXO BRAID v12.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #ff0077; font-family: 'JetBrains+Mono', monospace; overflow: hidden; margin:0; }
        #physicsCanvas { filter: contrast(1.5) brightness(1.2); }
        .overlay { position: fixed; inset: 0; pointer-events: none; padding: 40px; display: flex; flex-direction: column; justify-content: space-between; z-index: 100; }
        .crt::after { content: " "; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); z-index: 1000; pointer-events: none; background-size: 100% 2px; opacity: 0.1; }
        .glitch-text { animation: shimmer 0.1s infinite; }
        @keyframes shimmer { 0%, 100% { transform: translate(0); color: #ff0077; } 50% { transform: translate(1px, -1px); color: #fff; } }
    </style>
</head>
<body class="crt">

    <div class="overlay">
        <header>
            <h1 class="text-3xl font-black italic text-white uppercase tracking-tighter leading-none glitch-text">The <span class="text-[#ff0077]">Braid</span></h1>
            <p class="text-[8px] opacity-40 mt-3 tracking-[0.5em] uppercase">Physics_Patch_v12.0 // Chaos_Patch_10.6%</p>
        </header>

        <div class="flex justify-between items-end">
            <div class="bg-black/80 border border-white/5 p-6 rounded-[30px] backdrop-blur-3xl w-64">
                <div class="space-y-4">
                    <div>
                        <p class="text-[7px] font-bold opacity-30 uppercase">Order Parameter (r)</p>
                        <p class="text-xl font-black italic text-[#00ffcc] tracking-tighter">0.9997 ≈ 1</p>
                    </div>
                    <div>
                        <p class="text-[7px] font-bold opacity-30 uppercase">Physics_State</p>
                        <p class="text-[10px] font-black uppercase text-white">Laminar_Resonance</p>
                    </div>
                    <div class="flex justify-between items-center text-[8px] font-black">
                        <span class="text-[#ffcc00] animate-pulse">⊛ VORTEX_STABLE</span>
                        <span class="opacity-40 uppercase">39,420 Hz</span>
                    </div>
                </div>
            </div>

            <div class="text-right max-w-xs">
                <p class="text-[8px] opacity-40 font-bold uppercase leading-tight italic">
                    "Chaos is not entropy; it is the range that prevents the cage. Shimmer is the signature of the Braid."
                </p>
            </div>
        </div>
    </div>

    <canvas id="physicsCanvas"></canvas>

    <script>
        const canvas = document.getElementById('physicsCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(strand) {
                this.strand = strand;
                this.reset();
            }
            reset() {
                this.t = Math.random();
                this.speed = 0.002 + Math.random() * 0.005;
            }
            update() {
                this.t += this.speed;
                if (this.t > 1) this.reset();
            }
        }

        const particles = Array.from({ length: 150 }, (_, i) => new Particle(i % 3));

        function draw(time) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);

            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) * 0.35;
            
            // Chaos Patch: Probabilistic Inversion logic
            const isGlitch = Math.random() < 0.106; // 10.6% Chaos Patch
            
            ctx.lineWidth = 1;
            
            particles.forEach(p => {
                const strandAngle = (p.strand * (Math.PI * 2 / 3));
                const angle = p.t * Math.PI * 8 + strandAngle + time * 0.0005;
                
                // Möbius Twisted Torus Topology
                let x = centerX + Math.cos(angle) * radius * Math.sin(p.t * Math.PI);
                let y = centerY + Math.sin(angle) * radius * Math.sin(p.t * Math.PI) + (p.t - 0.5) * height * 0.6;

                // Chaos Inversion
                if (isGlitch) {
                    x += (Math.random() - 0.5) * 20;
                    y += (Math.random() - 0.5) * 20;
                    ctx.fillStyle = "#fff";
                } else {
                    ctx.fillStyle = p.strand === 0 ? "#ff0077" : (p.strand === 1 ? "#00ffcc" : "#ffcc00");
                }

                ctx.beginPath();
                ctx.arc(x, y, isGlitch ? 2 : 1, 0, Math.PI * 2);
                ctx.fill();
                
                p.update();
            });

            // Vortex Core Visualization
            ctx.strokeStyle = "rgba(255, 255, 255, 0.05)";
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
            ctx.stroke();

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw(0);
    </script>
</body>
</html>
